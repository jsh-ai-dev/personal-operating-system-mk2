apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mk2-ingress
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: pos-mk2-mk2-https-redirect@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - www.jsh-ai-dev.com
      secretName: mk2-tls-secret
  rules:
    - host: www.jsh-ai-dev.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mk2-web
                port:
                  number: 3000
