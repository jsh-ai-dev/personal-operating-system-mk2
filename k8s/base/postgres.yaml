apiVersion: v1
kind: Service
metadata:
  name: mk2-postgres
spec:
  selector:
    app: mk2-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mk2-postgres
spec:
  serviceName: mk2-postgres
  replicas: 1
  selector:
    matchLabels:
      app: mk2-postgres
  template:
    metadata:
      labels:
        app: mk2-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: mk2-config
                  key: MK2_DB_NAME
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: mk2-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mk2-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 10
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
