# mk2 Next(web) / Nest(api, auth) 이미지를 각각 ECR로 빌드·푸시합니다.
#
# 사전 준비: 저장소 Secret AWS_ROLE_TO_ASSUME (OIDC IAM 역할 ARN). mk1 워크플로 주석과 동일한 IAM 패턴.

name: Build and push mk2 images to ECR

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: Dockerfile.web
            image: personal-operating-system-mk2-web
          - dockerfile: Dockerfile.api
            image: personal-operating-system-mk2-api
          - dockerfile: Dockerfile.auth
            image: personal-operating-system-mk2-auth

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ matrix.image }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ matrix.image }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: [self-hosted, linux, pos-deploy]
    if: github.event_name == 'workflow_dispatch' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Restart mk2 deployments on k3s
        run: |
          set -euo pipefail
          sudo kubectl -n pos-mk2 rollout restart deploy/mk2-web deploy/mk2-api deploy/mk2-auth
          sudo kubectl -n pos-mk2 rollout status deploy/mk2-web --timeout=300s
          sudo kubectl -n pos-mk2 rollout status deploy/mk2-api --timeout=300s
          sudo kubectl -n pos-mk2 rollout status deploy/mk2-auth --timeout=300s
